name: CI — lint, build, test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (ruff)
        run: uv run ruff format --check .

  build-test:
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (with GHA layer cache)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: ml-ops-pipeline:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run pipeline inside image (dvc repro)
        run: |
          docker compose run --rm \
            -e EVIDENTLY_API_TOKEN="" \
            -e EVIDENTLY_PROJECT_ID="" \
            pipeline

      - name: Run guard tests inside image
        run: docker compose run --rm test

      - name: Smoke-test deployable apps
        run: bash scripts/smoke_apps.sh
