name: CI — build, test, smoke

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-verify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run reduced pipeline
        run: bash scripts/ci_pipeline.sh

      - name: Build Docker image
        run: docker build -t ml-ops-pipeline:ci .

      - name: Run guard tests inside Docker (G1-G4 + smoke)
        run: docker run --rm ml-ops-pipeline:ci python -m pytest -q

      - name: Smoke-test deployable apps
        run: bash scripts/smoke_apps.sh
